<!doctype html>
<html lang="de">
<head>
    <title>Spacing scale</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">

    <link rel="stylesheet" href="../../index.css">
    <style>

        @import url("../components/EveryLayout/all.css");

        .barContainer {
            display: flex;
            flex-direction: row;
            gap: 10px;
            align-items: center;
        }
        .bar {
            background-color: black;
            height: 10px;
            position: relative;
        }
        .info {
            font-size: small;
        }

    </style>
</head>
<body>
<noscript><strong>Please enable JavaScript to view this page correctly.</strong></noscript>
<header>

</header>
<main>

    <box-l borderWidth="0">
        <center-l max="1500px">
            <stack-l>
                <box-l>
                    <stack-l id="boxes">

                    </stack-l>
                </box-l>
            </stack-l>

        </center-l>
    </box-l>





</main>
<footer>

</footer>
<script type="module" src="../index.js"></script>
<script type="module">
    import '../components/EveryLayout/import_all.js';
</script>
<script>
    const rootStyles = getComputedStyle(document.documentElement);
    const stackBoxes = document.querySelector('stack-l#boxes');
    const spacingSteps = [0, 1, 2, 3, 4, 6, 8, 12, 16, 24];

    for (const step of spacingSteps) {
        const property = '--space-' + step;
        const scale = rootStyles.getPropertyValue(property);

        // Balken mit Breite
        let container = document.createElement('div');
        container.classList.add('barContainer');
        let bar = document.createElement('div');
        bar.classList.add('bar');
        let info = document.createElement('div');
        info.classList.add('info');
        info.innerText = property + ' (' + scale.trim() + ')';
        bar.style.width = scale;
        container.append(bar);
        container.append(info);
        stackBoxes.append(container);

    }

</script>
</body>
</html>
